<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Garden Plotter</title>
  <link rel="icon" href="/static/icons/favicon.svg" type="image/svg+xml">
  <link rel="icon" href="/static/favicon.ico" sizes="any">
  <script src="https://unpkg.com/htmx.org@2.0.3"></script>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <header>
    <nav>
      <a href="/" class="brand">Garden Plotter</a>
    </nav>
  </header>
  <main>
    {{block "content" .}}{{end}}
  </main>

  <dialog id="photo-lightbox" class="photo-lightbox">
    <img id="lightbox-img" src="" alt="">
    <button id="lightbox-close" class="lightbox-close" aria-label="Close">&#x2715;</button>
  </dialog>

  <script>
    (function () {
      var dlg = document.getElementById('photo-lightbox');
      var img = document.getElementById('lightbox-img');

      document.addEventListener('click', function (e) {
        var target = e.target.closest('.entry-image-item img');
        if (!target) return;
        img.src = target.src;
        img.alt = target.alt;
        dlg.showModal();
      });

      document.getElementById('lightbox-close').addEventListener('click', function () {
        dlg.close();
      });

      dlg.addEventListener('click', function (e) {
        if (e.target === dlg) dlg.close();
      });
    })();
  </script>
</body>
</html>
