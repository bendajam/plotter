<div id="group-harvest-list-{{.GroupID}}">
  {{if .Harvests}}
  <table class="harvest-table">
    <thead>
      <tr><th>Date</th><th>Weight</th><th>Notes</th><th></th></tr>
    </thead>
    <tbody>
      {{range .Harvests}}
      <tr>
        <td>{{.Date}}</td>
        <td class="harvest-weight">{{printf "%.0f" .WeightGrams}} g</td>
        <td class="harvest-notes">{{.Notes}}</td>
        <td>
          <button class="btn-icon btn-danger"
            hx-delete="/group-harvests/{{.ID}}"
            hx-confirm="Delete this harvest record?"
            hx-target="#group-harvest-list-{{.GroupID}}"
            hx-swap="outerHTML">&#x2715;</button>
        </td>
      </tr>
      {{end}}
    </tbody>
  </table>
  <p class="harvest-total">Total: <strong>{{groupHarvestTotal .Harvests}}</strong></p>
  {{else}}
  <p class="hint">No harvests recorded yet.</p>
  {{end}}
</div>
