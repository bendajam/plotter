{{template "layout.html" .}}
{{define "content"}}
<div class="form-page">
  <h1>New Garden Plot</h1>
  <form action="/plots" method="POST" enctype="multipart/form-data" class="upload-form">
    <div class="form-group">
      <label for="name">Plot Name</label>
      <input type="text" id="name" name="name" placeholder="e.g. Backyard Veggie Patch" required>
    </div>
    <div class="form-group">
      <label for="address">Address</label>
      <input type="text" id="address" name="address" placeholder="123 Garden St, City, State" required>
    </div>
    <div class="form-group">
      <label for="image">Map Image</label>
      <input type="file" id="image" name="image" accept="image/*" required>
      <p class="hint">Upload a photo, satellite image, or hand-drawn plan of your garden.</p>
    </div>
    <div class="form-actions">
      <a href="/" class="btn btn-secondary">Cancel</a>
      <button type="submit" class="btn btn-primary">Create Plot</button>
    </div>
  </form>
</div>
{{end}}
