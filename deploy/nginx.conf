# Drop this file in /etc/nginx/sites-available/plotter
# then: ln -s /etc/nginx/sites-available/plotter /etc/nginx/sites-enabled/plotter
# and:  nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name plotter.example.com;

    # Redirect HTTP → HTTPS (remove this block if not using TLS)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name plotter.example.com;

    # TLS — managed by certbot or similar
    ssl_certificate     /etc/letsencrypt/live/plotter.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/plotter.example.com/privkey.pem;

    # Upload size limit — raise if you upload large plot images
    client_max_body_size 50M;

    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
